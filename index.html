<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agnes AI Studio</title>
<style>
:root{--bg:#0f1117;--bg-card:#1a1b23;--bg-input:#232430;--border:#2d2e3a;--text:#e4e4e7;--text-dim:#8b8d9a;--primary:#6366f1;--primary-hover:#818cf8;--primary-glow:rgba(99,102,241,.25);--success:#22c55e;--error:#ef4444;--accent:#0ea5e9}
[data-theme="light"]{--bg:#f8f9fb;--bg-card:#fff;--bg-input:#f1f3f5;--border:#e2e4e9;--text:#1a1b23;--text-dim:#6b6e7d;--primary:#4f46e5;--primary-hover:#6366f1;--primary-glow:rgba(79,70,229,.18);--accent:#0284c7}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;transition:background .3s,color .3s}
.container{max-width:1000px;margin:0 auto;padding:0 16px}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
.logo{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.logo .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
.header-actions{display:flex;align-items:center;gap:8px}
.version-badge{font-size:11px;color:var(--text-dim);border:1px solid var(--border);border-radius:6px;padding:4px 6px}
.privacy-note{font-size:12px;line-height:1.5;color:var(--text-dim);margin-bottom:8px;padding:10px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px}
.api-key-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:20px;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px}
.api-key-bar label{font-size:13px;font-weight:600;white-space:nowrap;color:var(--text-dim)}
.api-key-bar input{flex:1;min-width:180px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;font-family:monospace}
.api-key-bar input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.api-key-bar .btn{white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover);box-shadow:0 0 20px var(--primary-glow)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text-dim)}
.btn-icon{padding:7px;border-radius:8px;background:transparent;color:var(--text-dim);border:1px solid var(--border);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.btn-icon:hover{color:var(--text);border-color:var(--text-dim)}
.tabs{display:flex;gap:4px;background:var(--bg-input);border-radius:10px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-dim);transition:all .2s;border:none;background:transparent;display:flex;align-items:center;justify-content:center;gap:6px}
.tab.active{background:var(--primary);color:#fff}
.tab:hover:not(.active){color:var(--text)}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
label{display:block;font-size:12px;font-weight:500;color:var(--text-dim);margin-bottom:5px}
.input,.textarea,.select{width:100%;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;transition:all .2s;font-family:inherit}
.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.textarea{resize:vertical;min-height:70px}
.select{cursor:pointer;appearance:none}
.form-grid{display:grid;gap:12px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:600px){.form-grid-2,.form-grid-3{grid-template-columns:1fr}.api-key-bar{align-items:stretch}.api-key-bar label{width:100%}.api-key-bar input{flex:1 1 100%;width:100%;min-width:0}.api-key-bar .btn{flex:1 1 calc(50% - 4px);justify-content:center;padding-left:10px;padding-right:10px}.history-tools .select,.history-tools .btn{flex:1 1 auto;max-width:none}.gallery{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))!important}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:24px;position:relative}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.gallery-item{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s;background:var(--bg-input)}
.gallery-item.img-item{aspect-ratio:1}
.gallery-item.video-item{aspect-ratio:16/9}
.gallery-item:hover{transform:scale(1.02)}
.gallery-item img,.gallery-item video{width:100%;height:100%;object-fit:cover}
.gallery-item .overlay{position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.7));opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;justify-content:center;padding:10px;gap:6px;pointer-events:none}
.gallery-item:hover .overlay{opacity:1}
.gallery-item .overlay button{padding:5px 10px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;background:var(--primary);color:#fff;z-index:2;position:relative;pointer-events:auto;}
.gallery-item .badge{position:absolute;top:6px;left:6px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(0,0,0,.6);color:#fff}
.progress-bar{width:100%;height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:10px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .3s;width:0}
.task-log{display:none;margin:10px 0 0;padding:10px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;font-size:12px;line-height:1.5;color:var(--text-dim);white-space:pre-wrap;word-break:break-word}
.task-log.show{display:block}
.task-log.error{border-color:rgba(239,68,68,.45);color:var(--error)}
.task-log.success{border-color:rgba(34,197,94,.45);color:var(--success)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:var(--success);color:#fff}
.toast.error{background:var(--error);color:#fff}
.history-tools{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;margin-bottom:8px}.history-tools .select{max-width:150px}.btn-small{padding:7px 10px;font-size:12px}
.empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:13px}
.empty svg{margin-bottom:8px;opacity:.3}
.img2img-upload{border:2px dashed var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;font-size:12px;color:var(--text-dim)}
.img2img-upload:hover{border-color:var(--primary);color:var(--text)}
.img2img-upload.has-image{border-color:var(--success);border-style:solid}
.img2img-upload img{max-width:100%;max-height:120px;border-radius:6px;margin-top:8px}
.video-tabs{display:flex;gap:2px;background:var(--bg-input);border-radius:6px;padding:2px;margin-bottom:14px}
.video-tab{flex:1;padding:6px;text-align:center;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-dim);background:transparent;border:none;transition:all .2s}
.video-tab.active{background:var(--accent);color:#fff}
.video-tab:hover:not(.active){color:var(--text)}
</style>
</head>

<header>

<div class="header-actions">

</div>
</header>

<div class="form-grid" style="margin-top:10px">
<div><label>尺寸</label><select class="select" id="imgSize">

<option value="1792x1024">1792 x 1024</option>
<option value="512x512">512 x 512</option>
</select></div>

</div>
<div style="margin-top:14px;display:flex;gap:8px;align-items:center">
<button class="btn btn-primary" id="imgGenerate"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>生成</button>
<span id="imgStatus" style="font-size:12px;color:var(--text-dim)"></span>
</div>
<div class="progress-bar" id="imgProgress" style="display:none"><div class="progress-fill"></div></div>
</div>
<div class="history-tools"><select class="select" id="imgFilter"><option value="all">全部图片</option><option value="T2I">文生图</option><option value="I2I">图生图</option></select><button class="btn btn-ghost btn-small" id="clearImgHistory">清空图片</button></div>

<button class="btn btn-ghost btn-small" id="copyVidTaskBtn" style="display:none">复制任务 ID</button>

</div>

</div>
<div class="history-tools"><select class="select" id="vidFilter"><option value="all">全部视频</option><option value="txt2vid">文生视频</option><option value="img2vid">图生视频</option><option value="multi">多图参考</option><option value="keyframe">关键帧</option><option value="resume">恢复任务</option></select><button class="btn btn-ghost btn-small" id="clearVidHistory">清空视频</button></div>

<div class="modal-overlay" id="settingsModal">

<label>图片 API 地址</label><input class="input" id="cfgImgUrl" style="margin-bottom:10px">
<label>图片模型</label><input class="input" id="cfgImgModel" style="margin-bottom:10px">

<div style="display:flex;gap:8px;justify-content:flex-end">
<button class="btn btn-ghost" id="settingsCancel">取消</button>
<button class="btn btn-primary" id="settingsSave">保存</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const D={imgApiUrl:"https://apihub.agnes-ai.com/v1/images/generations",imgModel:"agnes-image-2.1-flash",vidApiUrl:"https://apihub.agnes-ai.com/v1/videos",vidModel:"agnes-video-v2.0",vidQueryUrl:"https://apihub.agnes-ai.com/agnesapi",apiKey:""};
function loadC(){try{return{...D,...JSON.parse(localStorage.getItem("agnes-cfg")||"{}")};}catch(e){return{...D};}}
function saveC(c){localStorage.setItem("agnes-cfg",JSON.stringify(c));}
let C=loadC(),imgR=loadR("img"),vidR=loadR("vid");
function loadR(t){try{return JSON.parse(localStorage.getItem("agnes-"+t+"-results")||"[]");}catch(e){return[];}}
function saveR(t,r){var k="agnes-"+t+"-results";try{localStorage.setItem(k,JSON.stringify(r));return true;}catch(e){try{var slim=r.slice(0,Math.max(10,Math.floor(r.length/2)));localStorage.setItem(k,JSON.stringify(slim));if(t==="img")imgR=slim;else vidR=slim;toast("本地记录空间不足，已自动保留最近记录","error");return true;}catch(x){toast("本地记录保存失败，请删除部分历史记录","error");return false;}}}
function friendlyErr(err){var m=err&&err.message?err.message:String(err||"");if(/401|403/.test(m))return "API Key 无效或无权限";if(/429/.test(m))return "请求过于频繁，请稍后再试";if(/insufficient|balance|quota|余额|额度/i.test(m))return "余额或额度不足";if(/AbortError|超时|timeout/i.test(m))return "请求超时，请稍后重试";return m||"请求失败";}
function savePendingVideo(t){localStorage.setItem("agnes-pending-video",JSON.stringify(t));}
function clearPendingVideo(){localStorage.removeItem("agnes-pending-video");}
function showVidTask(kind,msg){var el=document.getElementById("vidTaskLog");if(!el)return;el.textContent=msg;el.className="task-log show"+(kind?" "+kind:"");try{localStorage.setItem("agnes-video-task-log",JSON.stringify({kind:kind||"",msg:msg,taskId:window.__vidTaskId||"",ts:Date.now()}));}catch(e){}}
function setVidTaskId(id){var btn=document.getElementById("copyVidTaskBtn");window.__vidTaskId=id||"";if(btn)btn.style.display=id?"inline-flex":"none";}
function clearVidTask(){var el=document.getElementById("vidTaskLog");if(el){el.textContent="";el.className="task-log";}setVidTaskId("");localStorage.removeItem("agnes-video-task-log");}
function loadVidTask(){var raw=localStorage.getItem("agnes-video-task-log");if(!raw)return;try{var x=JSON.parse(raw);if(x&&x.msg)showVidTask(x.kind||"",x.msg);if(x&&x.taskId)setVidTaskId(x.taskId);}catch(e){localStorage.removeItem("agnes-video-task-log");}}
function clearHistory(type){if(!confirm(type==="img"?"确定清空所有图片记录？":"确定清空所有视频记录？"))return;if(type==="img"){imgR=[];saveR("img",imgR);renderG("img",imgR);toast("图片记录已清空","success");}else{vidR=[];saveR("vid",vidR);renderG("vid",vidR);toast("视频记录已清空","success");}}
function pollDelay(base,errCount,startedAt){return (Date.now()-startedAt)/1000<120?15000:10000;}
function dataErr(d){var e=d&&(d.error||d.message||d.msg||d.detail||d.reason||d.data&&d.data.error||d.result&&d.result.error);if(!e)return "";return typeof e==="string"?e:e.message?e.message:JSON.stringify(e);}
function findVideoUrl(d){var hit="";function walk(x,k){if(hit||x==null)return;if(typeof x==="string"){if(/^https?:\/\//i.test(x)&&(/video|url|file|download|output|result/i.test(k)||/\.(mp4|mov|webm)(\?|#|$)/i.test(x)))hit=x;return;}if(Array.isArray(x)){x.forEach(function(v){walk(v,k);});return;}if(typeof x==="object"){var keys=Object.keys(x),pri=keys.filter(function(n){return /video|url|file|download|output|result/i.test(n);});pri.concat(keys.filter(function(n){return pri.indexOf(n)<0;})).forEach(function(n){walk(x[n],n);});}}walk(d,"");return hit;}

function apiFetch(targetUrl,opts,timeoutMs){
  var requestOpts={method:opts&&opts.method||"POST",headers:opts&&opts.headers||{},body:opts&&opts.body};
  var ctrl=new AbortController();
  requestOpts.signal=ctrl.signal;
  var timer=setTimeout(function(){ctrl.abort();},timeoutMs||60000);
  return fetch(targetUrl,requestOpts).catch(function(e){
    if(e.name==="AbortError")throw new Error("请求超时，请稍后重试");
    if(location.protocol==="file:")throw e;
    return fetch("/api/proxy",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({targetUrl:targetUrl,method:requestOpts.method,headers:requestOpts.headers,body:requestOpts.body}),signal:ctrl.signal});
  }).finally(function(){clearTimeout(timer);});
}

function renderG(type,results){
  var c=document.getElementById(type+"Gallery");

  c.innerHTML='';
  var wrap=document.createElement('div');
  wrap.className='gallery';
  results.forEach(function(r){
    var item=document.createElement('div');
    item.className='gallery-item '+(r.type==='video'?'video-item':'img-item');

    var link=document.createElement('a');
    link.href=r.url;
    link.target='_blank';
    link.rel='noopener noreferrer';
    link.style.display='block';
    link.style.width='100%';
    link.style.height='100%';

    if(r.type==='video'){
      var video=document.createElement('video');
      video.src=r.url;
      video.muted=true;
      video.loop=true;
      video.playsInline=true;
      video.style.pointerEvents='none';
      item.addEventListener('mouseenter',function(){video.play();});
      item.addEventListener('mouseleave',function(){video.pause();});
      link.appendChild(video);
    } else {
      var img=document.createElement('img');
      img.src=r.url;
      img.alt=r.prompt;
      img.loading='lazy';
      img.style.pointerEvents='none';
      link.appendChild(img);
    }
    item.appendChild(link);

    if(r.mode){
      var badge=document.createElement('span');
      badge.className='badge';
      badge.textContent=r.mode;
      item.appendChild(badge);
    }

    var overlay=document.createElement('div');
    overlay.className='overlay';
    var openBtn=document.createElement('button');
    openBtn.type='button';
    openBtn.title='打开';
    openBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v7h-7"/><path d="M3 10V3h7"/><path d="M3 21l7-7"/></svg>';
    openBtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();window.open(r.url,'_blank','noopener,noreferrer');});
    overlay.appendChild(openBtn);
    if(r.type==='image'){
      var refBtn=document.createElement('button');
      refBtn.type='button';
      refBtn.title='作为参考图';
      refBtn.textContent='参考';
      refBtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();setRef(r.url);});
      overlay.appendChild(refBtn);
    }
    var copyBtn=document.createElement('button');
    copyBtn.type='button';
    copyBtn.title='复制 URL';
    copyBtn.textContent='复制';
    copyBtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();copyUrl(r.url);});
    overlay.appendChild(copyBtn);
    if(r.type==='image'){
      var vidRefBtn=document.createElement('button');
      vidRefBtn.type='button';
      vidRefBtn.title='作为图生视频参考';
      vidRefBtn.textContent='视频';
      vidRefBtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();setVideoRef(r.url);});
      overlay.appendChild(vidRefBtn);
    }
    var delBtn=document.createElement('button');
    delBtn.type='button';
    delBtn.title='删除';
    delBtn.textContent='删';
    delBtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();delR(type,r.id);});
    overlay.appendChild(delBtn);

    var btn=document.createElement('button');
    btn.type='button';
    btn.title='下载';
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
    btn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();dlF(r.url,(r.type==='video'?'video_':'image_')+r.id+(r.type==='video'?'.mp4':'.png'));});
    overlay.appendChild(btn);
    item.appendChild(overlay);
    wrap.appendChild(item);
  });

}

async function resumePendingVideo(){
  var raw=localStorage.getItem("agnes-pending-video");
  if(!raw)return;
  var task;
  try{task=JSON.parse(raw);}catch(e){clearPendingVideo();return;}
  setVidTaskId(task.taskId||"");
  var st=document.getElementById("vidStatus"),pg=document.getElementById("vidProgress"),fl=pg.querySelector(".progress-fill"),btn=document.getElementById("vidGenerate");
  btn.disabled=true;pg.style.display="block";fl.style.width="35%";
  showVidTask("","检测到未完成的视频任务，正在恢复查询...\n任务 ID："+(task.taskId||"未返回")+"\n查询地址："+task.pUrl);
  toast("正在恢复未完成的视频任务","success");
  try{
    var maxW=600000,iv=2000,vUrl=null,errCount=0,t0=task.t0||Date.now(),lastState="恢复查询中";
    while(Date.now()-t0<maxW){
      var wait=_pv?pollDelay(iv,errCount,t0):Math.max(pollDelay(iv,errCount,t0),8000);
      await new Promise(function(r){setTimeout(r,wait);});
      var el=Math.round((Date.now()-t0)/1000);
      st.innerHTML='<span class="spinner"></span>恢复处理中... ('+el+' 秒)';
      fl.style.width=(35+Math.min(55,(el/600)*55))+"%";
      var pr=await apiFetch(task.pUrl,{method:"GET",headers:{"Authorization":"Bearer "+C.apiKey}},30000);
      if(!pr.ok){
        errCount++;
        var pe=await respErr(pr);
        lastState="查询失败 HTTP "+pr.status;
        showVidTask("error","恢复任务仍在查询，但最近一次查询失败\n任务 ID："+(task.taskId||"未返回")+"\n已用时："+el+" 秒\n下次查询约 "+Math.round(pollDelay(iv,errCount,t0)/1000)+" 秒后\n连续失败："+errCount+" 次\nHTTP "+pr.status+"\n"+pe);
        if(errCount>=3){clearPendingVideo();throw new Error("轮询连续失败 "+errCount+" 次，HTTP "+pr.status+"："+pe);}
        continue;
      }
      var res=await pr.json();
      errCount=0;
      var s=String(res.status||res.state||res.task_status||"").toLowerCase();
      lastState=s||"未返回状态";
      showVidTask("","恢复任务查询中...\n任务 ID："+(task.taskId||"未返回")+"\n已用时："+el+" 秒\n任务状态："+lastState+"\n下次查询约 "+Math.round(pollDelay(iv,errCount,t0)/1000)+" 秒后\n查询地址："+task.pUrl);
      if(s==="completed"||s==="succeeded"||s==="success"||s==="done"){
        vUrl=findVideoUrl(res);
        if(!vUrl){clearPendingVideo();throw new Error("任务已完成，但响应中没有找到视频 URL。响应摘要："+compactJson(res));}
        break;
      }
      if(s==="failed"||s==="error"||res.error){clearPendingVideo();throw new Error(dataErr(res)||"生成失败");}
    }
    if(!vUrl){clearPendingVideo();throw new Error("恢复任务超时，最后状态："+lastState);}
    clearPendingVideo();
    vidR=[{id:Date.now(),type:"video",url:vUrl,prompt:task.prompt||"",model:task.model||C.vidModel,duration:(task.nf/task.fr).toFixed(1)+" 秒",size:task.w+"x"+task.h,mode:task.mode||"resume",timestamp:new Date().toLocaleString()}].concat(vidR);
    if(vidR.length>50)vidR=vidR.slice(0,50);
    saveR("vid",vidR);renderG("vid",vidR);
    st.textContent="恢复完成";
    showVidTask("success","视频任务已恢复完成\n任务 ID："+(task.taskId||"未返回")+"\n结果 URL："+vUrl);
    toast("视频任务已恢复完成","success");
  }catch(err){
    var msg=friendlyErr(err),old=document.getElementById("vidTaskLog")&&document.getElementById("vidTaskLog").textContent;
    st.textContent="恢复失败："+msg;
    showVidTask("error",(old?old+"\n\n":"")+"视频任务恢复已停止\n失败原因："+msg+"\n停止时间："+new Date().toLocaleString());
    toast(msg,"error");
  }finally{
    btn.disabled=false;
    setTimeout(function(){pg.style.display="none";fl.style.width="0";},800);
  }
}
const AppModules={api:{fetch:apiFetch,readError:respErr},history:{load:loadR,save:saveR,clear:clearHistory,render:renderG},videoTask:{show:showVidTask,clear:clearVidTask,setId:setVidTaskId,resume:resumePendingVideo,nextDelay:pollDelay},ui:{toast:toast,setTheme:ui}};
window.AgnesStudio=AppModules;
document.getElementById("imgFilter").onchange=function(){renderG("img",imgR);};
document.getElementById("vidFilter").onchange=function(){renderG("vid",vidR);};
document.getElementById("clearImgHistory").onclick=function(){clearHistory("img");};
document.getElementById("clearVidHistory").onclick=function(){clearHistory("vid");};
document.getElementById("clearVidTaskBtn").onclick=function(){clearVidTask();toast("视频任务日志已清除","success");};
document.getElementById("copyVidTaskBtn").onclick=function(){if(window.__vidTaskId)copyUrl(window.__vidTaskId);};
renderG("img",imgR);renderG("vid",vidR);loadVidTask();resumePendingVideo();
</script>
</body>
