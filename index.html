<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agnes AI Studio</title>
<style>
:root{--bg:#0f1117;--bg-card:#1a1b23;--bg-input:#232430;--border:#2d2e3a;--text:#e4e4e7;--text-dim:#8b8d9a;--primary:#6366f1;--primary-hover:#818cf8;--primary-glow:rgba(99,102,241,.25);--success:#22c55e;--error:#ef4444;--accent:#0ea5e9}
[data-theme="light"]{--bg:#f8f9fb;--bg-card:#fff;--bg-input:#f1f3f5;--border:#e2e4e9;--text:#1a1b23;--text-dim:#6b6e7d;--primary:#4f46e5;--primary-hover:#6366f1;--primary-glow:rgba(79,70,229,.18);--accent:#0284c7}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;transition:background .3s,color .3s}
.container{max-width:1000px;margin:0 auto;padding:0 16px}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
.logo{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.logo .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
.header-actions{display:flex;align-items:center;gap:8px}
.api-key-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px}
.api-key-bar label{font-size:13px;font-weight:600;white-space:nowrap;color:var(--text-dim)}
.api-key-bar input{flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;font-family:monospace}
.api-key-bar input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover);box-shadow:0 0 20px var(--primary-glow)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text-dim)}
.btn-icon{padding:7px;border-radius:8px;background:transparent;color:var(--text-dim);border:1px solid var(--border);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.btn-icon:hover{color:var(--text);border-color:var(--text-dim)}
.tabs{display:flex;gap:4px;background:var(--bg-input);border-radius:10px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-dim);transition:all .2s;border:none;background:transparent;display:flex;align-items:center;justify-content:center;gap:6px}
.tab.active{background:var(--primary);color:#fff}
.tab:hover:not(.active){color:var(--text)}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
label{display:block;font-size:12px;font-weight:500;color:var(--text-dim);margin-bottom:5px}
.input,.textarea,.select{width:100%;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;transition:all .2s;font-family:inherit}
.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.textarea{resize:vertical;min-height:70px}
.select{cursor:pointer;appearance:none}
.form-grid{display:grid;gap:12px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:600px){.form-grid-2,.form-grid-3{grid-template-columns:1fr}.gallery{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))!important}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:24px;position:relative}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.gallery-item{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s;background:var(--bg-input)}
.gallery-item.img-item{aspect-ratio:1}
.gallery-item.video-item{aspect-ratio:16/9}
.gallery-item:hover{transform:scale(1.02)}
.gallery-item img,.gallery-item video{width:100%;height:100%;object-fit:cover}
.gallery-item .overlay{position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.7));opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;justify-content:center;padding:10px;gap:6px}
.gallery-item:hover .overlay{opacity:1}
.gallery-item .overlay button{padding:5px 10px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;background:var(--primary);color:#fff;z-index:2;position:relative;}
.gallery-item .badge{position:absolute;top:6px;left:6px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(0,0,0,.6);color:#fff}
.progress-bar{width:100%;height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:10px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .3s;width:0}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:var(--success);color:#fff}
.toast.error{background:var(--error);color:#fff}
.empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:13px}
.empty svg{margin-bottom:8px;opacity:.3}
.img2img-upload{border:2px dashed var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;font-size:12px;color:var(--text-dim)}
.img2img-upload:hover{border-color:var(--primary);color:var(--text)}
.img2img-upload.has-image{border-color:var(--success);border-style:solid}
.img2img-upload img{max-width:100%;max-height:120px;border-radius:6px;margin-top:8px}
.video-tabs{display:flex;gap:2px;background:var(--bg-input);border-radius:6px;padding:2px;margin-bottom:14px}
.video-tab{flex:1;padding:6px;text-align:center;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-dim);background:transparent;border:none;transition:all .2s}
.video-tab.active{background:var(--accent);color:#fff}
.video-tab:hover:not(.active){color:var(--text)}
</style>
</head>
<body>
<div class="container">
<header>
<div class="logo"><div class="dot"></div>Agnes AI 创意工作室</div>
<div class="header-actions">
<a class="btn-icon" href="https://github.com/qmzz/Agnes-AI-Studio" target="_blank" rel="noopener noreferrer" title="qmzz/Agnes-AI-Studio" aria-label="qmzz/Agnes-AI-Studio">

</a>

</button>
</div>
</header>
<div class="api-key-bar">
<label>API Key</label>
<input type="password" id="apiKeyInput" placeholder="输入你的 Agnes AI API Key...">

<input class="input" id="imgRefUrl" placeholder="https://example.com/reference.png">
</div>

<textarea class="textarea" id="imgPrompt" rows="3" placeholder="一座发光的浮空城市漂浮在薄雾笼罩的峡谷之上，日出时分，电影级写实风格..."></textarea>
<div class="form-grid form-grid-2" style="margin-top:10px">
<div><label>尺寸</label><select class="select" id="imgSize">
<option value="1024x1024">1024 x 1024</option>
<option value="1024x768" selected>1024 x 768</option>
<option value="768x1024">768 x 1024</option>
<option value="1024x1792">1024 x 1792</option>
<option value="1792x1024">1792 x 1024</option>
<option value="512x512">512 x 512</option>
</select></div>

<option value="url">URL</option>

</select></div>

<span id="imgStatus" style="font-size:12px;color:var(--text-dim)"></span>
</div>

</div>
<div id="imgGallery"></div>

<div class="video-tabs">
<button class="video-tab active" data-vidmode="txt2vid">文生视频</button>
<button class="video-tab" data-vidmode="img2vid">图生视频</button>
<button class="video-tab" data-vidmode="multi">多图参考</button>

</div>
<label style="margin-top:12px">提示词</label>
<textarea class="textarea" id="vidPrompt" rows="3" placeholder="一只猫在日落时分的海滩上散步，电影级镜头..."></textarea>

<option value="1152x768" selected>1152 x 768</option>
<option value="1280x720">1280 x 720</option>
<option value="1920x1080">1920 x 1080</option>
<option value="768x1152">768 x 1152</option>
<option value="720x1280">720 x 1280</option>
</select></div>

<div><label>帧率</label><select class="select" id="vidFps">
<option value="16">16</option>
<option value="24" selected>24</option>
<option value="30">30</option>
</select></div>
</div>
<div style="margin-top:14px;display:flex;gap:8px;align-items:center">
<button class="btn btn-primary" id="vidGenerate"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>生成</button>
<span id="vidStatus" style="font-size:12px;color:var(--text-dim)"></span>
</div>
<div class="progress-bar" id="vidProgress" style="display:none"><div class="progress-fill"></div></div>
</div>
<div id="vidGallery"></div>
</div>
</div>
<div class="modal-overlay" id="settingsModal">
<div class="modal">
<h2><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>高级设置</h2>
<label>图片 API 地址</label><input class="input" id="cfgImgUrl" style="margin-bottom:10px">
<label>图片模型</label><input class="input" id="cfgImgModel" style="margin-bottom:10px">
<label>视频 API 地址</label><input class="input" id="cfgVidUrl" style="margin-bottom:10px">
<label>视频模型</label><input class="input" id="cfgVidModel" style="margin-bottom:10px">
<label>视频查询地址</label><input class="input" id="cfgVidQueryUrl" style="margin-bottom:14px;font-size:12px">
<div style="display:flex;gap:8px;justify-content:flex-end">
<button class="btn btn-ghost" id="settingsCancel">取消</button>
<button class="btn btn-primary" id="settingsSave">保存</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const D={imgApiUrl:"https://apihub.agnes-ai.com/v1/images/generations",imgModel:"agnes-image-2.1-flash",vidApiUrl:"https://apihub.agnes-ai.com/v1/videos",vidModel:"agnes-video-v2.0",vidQueryUrl:"https://apihub.agnes-ai.com/agnesapi",apiKey:""};
function loadC(){try{return{...D,...JSON.parse(localStorage.getItem("agnes-cfg")||"{}")};}catch(e){return{...D};}}
function saveC(c){localStorage.setItem("agnes-cfg",JSON.stringify(c));}
let C=loadC(),imgR=loadR("img"),vidR=loadR("vid");
function loadR(t){try{return JSON.parse(localStorage.getItem("agnes-"+t+"-results")||"[]");}catch(e){return[];}}
function saveR(t,r){localStorage.setItem("agnes-"+t+"-results",JSON.stringify(r));}
const root=document.documentElement,th=localStorage.getItem("agnes-th")||"dark";
root.setAttribute("data-theme",th);ui(th);
document.getElementById("themeToggle").onclick=function(){const n=root.getAttribute("data-theme")==="dark"?"light":"dark";root.setAttribute("data-theme",n);localStorage.setItem("agnes-th",n);ui(n);};
function ui(t){document.getElementById("sunIcon").style.display=t==="dark"?"block":"none";document.getElementById("moonIcon").style.display=t==="light"?"block":"none";}
document.getElementById("apiKeyInput").value=C.apiKey;
document.getElementById("saveKeyBtn").onclick=function(){C.apiKey=document.getElementById("apiKeyInput").value.trim();saveC(C);toast("API Key 已保存","success");};
document.querySelectorAll(".tabs .tab").forEach(function(t){t.onclick=function(){document.querySelectorAll(".tabs .tab").forEach(function(x){x.classList.remove("active");});t.classList.add("active");document.getElementById("imagePanel").style.display=t.dataset.tab==="image"?"block":"none";document.getElementById("videoPanel").style.display=t.dataset.tab==="video"?"block":"none";};});
document.querySelectorAll("[data-imgmode]").forEach(function(t){t.onclick=function(){document.querySelectorAll("[data-imgmode]").forEach(function(x){x.classList.remove("active");});t.classList.add("active");document.getElementById("img2imgUpload").style.display=t.dataset.imgmode==="img2img"?"block":"none";};});
document.querySelectorAll("[data-vidmode]").forEach(function(t){t.onclick=function(){document.querySelectorAll("[data-vidmode]").forEach(function(x){x.classList.remove("active");});t.classList.add("active");var m=t.dataset.vidmode;document.getElementById("vidImgUpload").style.display=m!=="txt2vid"?"block":"none";document.getElementById("vidRefUrls").placeholder=m==="img2vid"?"https://example.com/reference.png":"每行一个图片 URL";};});
function listUrls(v){return v.split(/\s+/).map(function(x){return x.trim();}).filter(Boolean);}
var modal=document.getElementById("settingsModal");
document.getElementById("settingsBtn").onclick=function(){document.getElementById("cfgImgUrl").value=C.imgApiUrl;document.getElementById("cfgImgModel").value=C.imgModel;document.getElementById("cfgVidUrl").value=C.vidApiUrl;document.getElementById("cfgVidModel").value=C.vidModel;document.getElementById("cfgVidQueryUrl").value=C.vidQueryUrl;modal.classList.add("open");};
document.getElementById("settingsCancel").onclick=function(){modal.classList.remove("open");};
modal.onclick=function(e){if(e.target===modal)modal.classList.remove("open");};
document.getElementById("settingsSave").onclick=function(){C.imgApiUrl=document.getElementById("cfgImgUrl").value.trim()||D.imgApiUrl;C.imgModel=document.getElementById("cfgImgModel").value.trim()||D.imgModel;C.vidApiUrl=document.getElementById("cfgVidUrl").value.trim()||D.vidApiUrl;C.vidModel=document.getElementById("cfgVidModel").value.trim()||D.vidModel;C.vidQueryUrl=document.getElementById("cfgVidQueryUrl").value.trim()||D.vidQueryUrl;saveC(C);modal.classList.remove("open");toast("设置已保存","success");};
function apiFetch(targetUrl,opts,timeoutMs){
  var requestOpts={method:opts&&opts.method||"POST",headers:opts&&opts.headers||{},body:opts&&opts.body};
  var ctrl=new AbortController();
  requestOpts.signal=ctrl.signal;
  var timer=setTimeout(function(){ctrl.abort();},timeoutMs||60000);
  return fetch(targetUrl,requestOpts).finally(function(){clearTimeout(timer);});
}
document.getElementById("imgGenerate").onclick=genImg;
async function genImg(){
  var prompt=document.getElementById("imgPrompt").value.trim();
  if(!prompt)return toast("请输入提示词","error");
  if(!C.apiKey)return toast("请输入 API Key","error");
  var btn=document.getElementById("imgGenerate"),st=document.getElementById("imgStatus"),pg=document.getElementById("imgProgress"),fl=pg.querySelector(".progress-fill");
  var mode=document.querySelector("[data-imgmode].active").dataset.imgmode;
  if(btn.disabled)return;btn.disabled=true;st.innerHTML='<span class="spinner"></span>生成中...';pg.style.display="block";fl.style.width="30%";
  try{
    var t0=Date.now(),size=document.getElementById("imgSize").value,fmt=document.getElementById("imgFormat").value;
    var body={model:C.imgModel,prompt:prompt,size:size};
    if(fmt==="base64")body.return_base64=true;else body.extra_body={response_format:"url"};
    if(mode==="img2img"){var ref=document.getElementById("imgRefUrl").value.trim();if(!ref)return toast("请输入参考图 URL","error");body.tags=["img2img"];body.extra_body={image:[ref],response_format:fmt==="base64"?"b64_json":"url"};}
    var resp=await apiFetch(C.imgApiUrl,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+C.apiKey},body:JSON.stringify(body)});
    fl.style.width="80%";
    if(!resp.ok){var et=await resp.text(),em;try{em=JSON.parse(et).error.message||JSON.parse(et).error||et;}catch(e){em=et;}throw new Error(em);}
    var data=await resp.json();fl.style.width="100%";
    var imgs=data.data||[];if(!imgs.length)throw new Error("未返回图片");
    var el=((Date.now()-t0)/1000).toFixed(1);
    var nr=imgs.map(function(img,i){return{id:Date.now()+"_"+i,type:"image",url:img.b64_json?("data:image/png;base64,"+img.b64_json):img.url,prompt:prompt,model:C.imgModel,size:size,timestamp:new Date().toLocaleString(),mode:mode==="img2img"?"I2I":"T2I"};});
    imgR=[].concat(nr,imgR);if(imgR.length>100)imgR=imgR.slice(0,100);saveR("img",imgR);renderG("img",imgR);st.textContent="完成，耗时 "+el+" 秒";toast("已生成 "+imgs.length+" 张图片","success");
  }catch(err){st.textContent="";toast(err.message,"error");}
  finally{btn.disabled=false;setTimeout(function(){pg.style.display="none";fl.style.width="0";},800);}
}
document.getElementById("vidGenerate").onclick=genVid;
(function(){var vidFpsEl=document.getElementById("vidFps"),vidFramesEl=document.getElementById("vidFrames");var durations=[3,5,7,10,18];function updateFrames(){var fps=parseInt(vidFpsEl.value);var prevVal=vidFramesEl.value;vidFramesEl.innerHTML="";durations.forEach(function(d){var n=fps*d+1;if(n>441)return;var opt=document.createElement("option");opt.value=n;opt.textContent=n+" ("+d+"秒)";if(n==121)opt.selected=true;vidFramesEl.appendChild(opt);});if(prevVal){var found=false;for(var i=0;i<vidFramesEl.options.length;i++){if(vidFramesEl.options[i].value===prevVal){vidFramesEl.selectedIndex=i;found=true;break;}}if(!found&&vidFramesEl.options.length>1)vidFramesEl.selectedIndex=1;}}vidFpsEl.addEventListener("change",updateFrames);updateFrames();})();
async function genVid(){
  var prompt=document.getElementById("vidPrompt").value.trim();
  if(!prompt)return toast("请输入提示词","error");
  if(!C.apiKey)return toast("请输入 API Key","error");
  var btn=document.getElementById("vidGenerate"),st=document.getElementById("vidStatus"),pg=document.getElementById("vidProgress"),fl=pg.querySelector(".progress-fill");
  var mode=document.querySelector("[data-vidmode].active").dataset.vidmode;
  if(btn.disabled)return;btn.disabled=true;st.innerHTML='<span class="spinner"></span>提交中...';pg.style.display="block";fl.style.width="10%";
  try{
    var t0=Date.now(),sz=document.getElementById("vidSize").value.split("x"),w=parseInt(sz[0]),h=parseInt(sz[1]),nf=parseInt(document.getElementById("vidFrames").value),fr=parseInt(document.getElementById("vidFps").value);
    var body={model:C.vidModel,prompt:prompt,height:h,width:w,num_frames:nf,frame_rate:fr};
    if(mode==="img2vid"){var urls=listUrls(document.getElementById("vidRefUrls").value);if(urls.length<1)return toast("请输入参考图 URL","error");body.image=urls[0];}
    else if(mode==="multi"){var urls=listUrls(document.getElementById("vidRefUrls").value);if(urls.length<1)return toast("请输入参考图 URL","error");body.extra_body={image:urls};}
    else if(mode==="keyframe"){var urls=listUrls(document.getElementById("vidRefUrls").value);if(urls.length<2)return toast("请输入至少 2 个关键帧 URL","error");body.extra_body={image:urls,mode:"keyframes"};}
    var cr=await apiFetch(C.vidApiUrl,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+C.apiKey},body:JSON.stringify(body)});
    fl.style.width="25%";
    if(!cr.ok){var et=await cr.text(),em;try{em=JSON.parse(et).error.message||JSON.parse(et).error||et;}catch(e){em=et;}throw new Error(em);}
    var td=await cr.json();
    var vid=td.video_id||td.videoId||td.data&&td.data.video_id||td.result&&td.result.video_id;
    var tid=td.task_id||td.taskId||td.id||td.data&&td.data.task_id||td.result&&td.result.task_id;
    st.innerHTML='<span class="spinner"></span>处理中...';fl.style.width="35%";
    var pUrl=vid?C.vidQueryUrl+"?video_id="+encodeURIComponent(vid):tid?C.vidApiUrl+"/"+encodeURIComponent(tid):C.vidQueryUrl;
    var maxW=600000,iv=2000,vUrl=null,errCount=0;
    while(Date.now()-t0<maxW){await new Promise(function(r){setTimeout(r,_pv?iv:Math.max(iv,8000));});var el=Math.round((Date.now()-t0)/1000);st.innerHTML='<span class="spinner"></span>处理中... ('+el+' 秒)';fl.style.width=(35+Math.min(55,(el/600)*55))+"%";var pr=await apiFetch(pUrl,{method:"GET",headers:{"Authorization":"Bearer "+C.apiKey}});if(!pr.ok){errCount++;if(errCount>=3)throw new Error("轮询连续失败 "+errCount+" 次，HTTP "+pr.status);continue;}var res=await pr.json();errCount=0;var s=String(res.status||res.state||res.task_status||"").toLowerCase();if(s==="completed"||s==="succeeded"||s==="success"||s==="done"){vUrl=res.video_url||res.output&&res.output.video_url||res.output&&res.output.url||res.result&&res.result.video_url||res.result&&res.result.url||res.data&&res.data.video_url||res.data&&res.data.url;break;}if(s==="failed"||s==="error"||res.error)throw new Error(res.error&&res.error.message||res.error||"生成失败");if(s==="submitted"||s==="queued"||s==="running"||s==="processing"||s==="pending"||!s)continue;}
    if(!vUrl)throw new Error("超时：等待 "+Math.round((Date.now()-t0)/1000)+" 秒后仍未完成");fl.style.width="100%";var tt=((Date.now()-t0)/1000).toFixed(1);
    vidR=[{id:Date.now(),type:"video",url:vUrl,prompt:prompt,model:C.vidModel,duration:(nf/fr).toFixed(1)+" 秒",size:w+"x"+h,mode:mode,timestamp:new Date().toLocaleString()}].concat(vidR);if(vidR.length>50)vidR=vidR.slice(0,50);saveR("vid",vidR);renderG("vid",vidR);st.textContent="完成，耗时 "+tt+" 秒";toast("视频已生成","success");
  }catch(err){st.textContent="";toast(err.message,"error");}
  finally{btn.disabled=false;setTimeout(function(){pg.style.display="none";fl.style.width="0";},800);}
}
function renderG(type,results){
  var c=document.getElementById(type+"Gallery");
  if(!results.length){c.innerHTML='<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><p>还没有生成结果</p></div>';return;}
  c.innerHTML='';
  var wrap=document.createElement('div');
  wrap.className='gallery';
  results.forEach(function(r){
    var item=document.createElement('a');
    item.className='gallery-item '+(r.type==='video'?'video-item':'img-item');
    item.href=r.url;
    item.target='_blank';
    item.rel='noopener noreferrer';

    if(r.type==='video'){
      var video=document.createElement('video');
      video.src=r.url;
      video.muted=true;
      video.loop=true;
      video.playsInline=true;
      video.style.pointerEvents='none';
      item.addEventListener('mouseenter',function(){video.play();});
      item.addEventListener('mouseleave',function(){video.pause();});
      item.appendChild(video);
    } else {
      var img=document.createElement('img');
      img.src=r.url;
      img.alt=r.prompt;
      img.loading='lazy';
      img.style.pointerEvents='none';
      item.appendChild(img);
    }

    if(r.mode){
      var badge=document.createElement('span');
      badge.className='badge';
      badge.textContent=r.mode;
      item.appendChild(badge);
    }

    var overlay=document.createElement('div');
    overlay.className='overlay';
    var openBtn=document.createElement('button');
    openBtn.type='button';
    openBtn.title='打开';
    openBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v7h-7"/><path d="M3 10V3h7"/><path d="M3 21l7-7"/></svg>';
    openBtn.addEventListener('click',function(e){
      e.preventDefault();
      e.stopPropagation();
      window.open(r.url,'_blank','noopener,noreferrer');
    });
    overlay.appendChild(openBtn);
    if(r.type==='image'){
      var refBtn=document.createElement('button');
      refBtn.type='button';
      refBtn.title='作为参考图';
      refBtn.textContent='参考';
      refBtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();setRef(r.url);});
      overlay.appendChild(refBtn);
    }
    var delBtn=document.createElement('button');
    delBtn.type='button';
    delBtn.title='删除';
    delBtn.textContent='删';
    delBtn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();delR(type,r.id);});
    overlay.appendChild(delBtn);

    var btn=document.createElement('button');
    btn.type='button';
    btn.title='下载';
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
    btn.addEventListener('click',function(e){
      e.preventDefault();
      e.stopPropagation();
      dlF(r.url,(r.type==='video'?'video_':'image_')+r.id+(r.type==='video'?'.mp4':'.png'));
    });
    overlay.appendChild(btn);
    item.appendChild(overlay);
    wrap.appendChild(item);
  });
  c.appendChild(wrap);
}

function delR(type,id){if(type==="img"){imgR=imgR.filter(function(x){return x.id!==id;});saveR("img",imgR);renderG("img",imgR);}else{vidR=vidR.filter(function(x){return x.id!==id;});saveR("vid",vidR);renderG("vid",vidR);}}
function setRef(u){document.querySelector('[data-tab="image"]').click();document.querySelector('[data-imgmode="img2img"]').click();document.getElementById("imgRefUrl").value=u;toast("已设为图生图参考图","success");}
async function dlF(u,n){
  try{
    if(u.indexOf('data:')===0||u.indexOf('blob:')===0){
      var a=document.createElement('a');a.href=u;a.download=n;a.style.display='none';document.body.appendChild(a);a.click();document.body.removeChild(a);return;
    }
    var resp=await fetch(u,{mode:'cors'});if(!resp.ok)throw 0;
    var blob=await resp.blob();var objUrl=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=objUrl;a.download=n;a.style.display='none';document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(objUrl);},60000);
  }catch(e){window.open(u,'_blank','noopener,noreferrer');}
}
function toast(m,t){var el=document.getElementById("toast");el.textContent=m;el.className="toast show "+t;setTimeout(function(){el.className="toast";},3000);}
var _pv=1;document.addEventListener("visibilitychange",function(){_pv=document.hidden?0:1;});
renderG("img",imgR);renderG("vid",vidR);
</script>
